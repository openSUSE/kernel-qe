        - "Run xfsdump with increased verbosity (-v debug) to trace I/O operations"
    output_patterns:
      - pattern: "error writing stream terminator"
        meaning: "Failed to finalize the dump on tape, likely an I/O or media error"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "data mismatch"
        meaning: "Restored file content differs from original, indicating dump/restore logic error"
        bug_probability: high
        classification: kernel_bug
      - pattern: "xfsdump: ending inventory media file.*failed"
        meaning: "Failed to write inventory to tape, may affect future incremental restores"
        bug_probability: medium
