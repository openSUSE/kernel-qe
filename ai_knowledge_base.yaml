version: '2.0'
generated_at: '2026-04-17'
model: gemini-2.5-flash
tests:
  xfs/001:
    description: "Test xfs_db write of XFS BMBT entries with various bit lengths and values"
    subsystem: "xfs_db / bmbt"
    test_type: "db auto quick"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "xfs_db field definitions for BMBT (Block Map B-tree) mismatching current kernel structure"
        - "Incorrect bit-length constants in the test script for the specific XFS version"
      investigation_steps:
        - "Verify xfsprogs version and whether it matches the XFS on-disk format version"
        - "Check if the inode bmx prefix is correctly identified using _scratch_get_bmx_prefix"
        - "Compare BMBT_EXNTFLAG_BITLEN and other constants against xfs_format.h"
      platform_factors:
        s390x:
          bug_probability: medium
          note: "Big-endian byte order may cause bitmasking errors in xfs_db write operations"
          extra_steps:
            - "Check if xfs_db write is correctly swapping bytes for BMBT entries on big-endian"
    output_patterns:
      - pattern: "could not find bmx prefix from inode"
        meaning: "Test failed to find the block map prefix, likely due to unexpected inode format or xfs_db error"
        bug_probability: low
        classification: test_bug
      - pattern: "unable to convert value"
        meaning: "xfs_db failed to parse the value provided for the field, check for tool version mismatch"
        bug_probability: low
        classification: tool_version_mismatch
      - pattern: "incorrect value for"
        meaning: "The value written by xfs_db was not what was read back, indicating a tool or verifier bug"
        bug_probability: high
        classification: kernel_bug

  xfs/002:
    description: "Test that garbage in old v4 superblocks doesn't trip verifiers during growfs"
    subsystem: "growfs / superblock"
    test_type: "auto quick growfs"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Secondary superblock verifiers being too strict on non-CRC (v4) filesystems"
        - "Kernel growfs path failing to ignore junk in v5-only fields when operating on v4"
      investigation_steps:
        - "Check dmesg for XFS verifier error messages (e.g., 'Metadata corruption detected')"
        - "Verify if the kernel includes commit 10e6e65 or its fixes"
        - "Check if xfsprogs growfs is attempting to update fields that shouldn't exist in v4"
    output_patterns:
      - pattern: "growfs failed"
        meaning: "The growfs operation was rejected by the kernel, likely due to superblock verifier failure"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Metadata corruption detected"
        meaning: "Kernel verifier tripped on the secondary superblock 'garbage' injected by the test"
        bug_probability: high
        classification: kernel_bug
      - pattern: "unrecognized option"
        meaning: "xfs_growfs version mismatch"
        bug_probability: low
        classification: tool_version_mismatch

  xfs/003:
    description: "Exercise xfs_db stack commands (push/pop) and type switching logic"
    subsystem: "xfs_db"
    test_type: "db auto quick"
    failure_analysis:
      bug_probability: low
      classification: tool_version_mismatch
      common_causes:
        - "Regression in xfs_db command processing logic (bug #784078)"
        - "Memory corruption in xfs_db leading to core dump when manipulating the location ring"
      investigation_steps:
        - "Check for core files in the test directory"
        - "Run xfs_db manually with the failing command sequence (-c 'pop' -c 'type sb' etc.)"
        - "Verify if xfs_db internal ring buffer is overflowing"
    output_patterns:
      - pattern: "FAILED - core file"
        meaning: "xfs_db crashed during execution"
        bug_probability: high
        classification: test_bug
      - pattern: "non-zero exit status"
        meaning: "xfs_db returned an error code for standard stack operations"
        bug_probability: medium
        classification: tool_version_mismatch
      - pattern: "no current object"
        meaning: "This is expected for some subtests but indicates failure if it appears in TEST 5"
        bug_probability: low
        classification: test_bug

  xfs/004:
    description: "Verify xfs_db freesp command output matches df and accounts for reserved blocks"
    subsystem: "xfs_db / freesp"
    test_type: "db auto quick"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "Mismatch in how xfs_db and df calculate available blocks (specifically reserved blocks)"
        - "XFS free space btree corruption resulting in incorrect freesp reporting"
      investigation_steps:
        - "Compare mkfs output against dbsize variable in the test"
        - "Check if resblks are being properly accounted for in the perl calculation"
        - "Verify if dmerror or other environment factors are limiting reported free space"
    output_patterns:
      - pattern: "freesp mismatch"
        meaning: "The sum of free blocks reported by xfs_db does not match the space reported by df"
        bug_probability: medium
        classification: kernel_bug
      - pattern: "pct mismatch"
        meaning: "The percentage column in xfs_db freesp does not total 100%"
        bug_probability: high
        classification: tool_version_mismatch
      - pattern: "no xfs_db free blocks line"
        meaning: "xfs_db failed to produce the expected summary line, likely a tool failure"
        bug_probability: low
        classification: tool_version_mismatch

  xfs/005:
    description: "Test that a primary V5 superblock with an invalid CRC causes mount failure"
    subsystem: "superblock / crc"
    test_type: "auto quick"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Kernel mount path incorrectly ignoring CRC validation on the primary superblock"
        - "xfs_db or xfs_io failing to properly overwrite the CRC field at offset 224"
      investigation_steps:
        - "Check dmesg for 'bad primary superblock' or 'CRC error' during mount"
        - "Verify that the filesystem was created with CRC enabled (v5)"
        - "Manually inspect offset 224 of the scratch device to ensure corruption was applied"
    output_patterns:
      - pattern: "Structure needs cleaning"
        meaning: "Mount failed as expected (Pass condition), if this is MISSING the test fails"
        bug_probability: low
        classification: kernel_bug
      - pattern: "mount: /mnt/scratch: mount failed: Invalid argument"
        meaning: "Unexpected error code; kernel should return EFSCORRUPTED (Structure needs cleaning)"
        bug_probability: medium
        classification: kernel_bug

  xfs/006:
    description: "Test XFS sysfs configuration to stop retrying writeback at unmount on errors"
    subsystem: "error handling / sysfs"
    test_type: "auto quick mount eio"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "The 'fail_at_unmount' sysfs attribute is not correctly implemented or respected by the AIL"
        - "Kernel configuration missing CONFIG_SYSFS or XFS-specific sysfs support"
        - "Race condition where unmount hangs despite fail_at_unmount being set"
      investigation_steps:
        - "Check if /sys/fs/xfs/<dev>/error/fail_at_unmount exists"
        - "Monitor dmesg during unmount for infinite retry loops (e.g., repeating EIO errors)"
        - "Verify dm-error is correctly injecting errors using 'dmerror_load_error_table'"
    output_patterns:
      - pattern: "Failed to set error/fail_at_unmount"
        meaning: "Test could not configure sysfs, likely due to kernel version or missing support"
        bug_probability: low
        classification: config_problem
      - pattern: "hang"
        meaning: "Unmount operation did not complete, indicating fail_at_unmount failed to stop retries"
        bug_probability: high
        classification: kernel_bug

  xfs/007:
    description: "Verify Q_XQUOTARM functionality for removing internal quota files"
    subsystem: "quota"
    test_type: "auto quota quick"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Q_XQUOTARM (remove) failing to truncate or deallocate blocks of internal quota inodes"
        - "Kernel quota state machine not allowing removal after quotaoff"
        - "V4 vs V5 differences in how project/group quota inodes are handled"
      investigation_steps:
        - "Compare core.nblocks before and after the 'remove' command using xfs_db"
        - "Check if quota was turned off correctly using 'off' before attempting 'remove'"
        - "Verify if the kernel requires a remount to fully shut down quota accounting"
    output_patterns:
      - pattern: "core.nblocks = 1"
        meaning: "If appearing in 'Usage after quotarm', indicates blocks were not deallocated"
        bug_probability: high
        classification: kernel_bug
      - pattern: "XFS_QUOTARM: Invalid argument"
        meaning: "Kernel does not support the quota removal ioctl or flags"
        bug_probability: medium
        classification: kernel_bug

  xfs/008:
    description: "Test random hole creation and bmap reporting using randholes utility"
    subsystem: "ioctl / sparse files"
    test_type: "rw ioctl auto quick"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "XFS BMBT not merging or splitting extents correctly during random writes"
        - "xfs_bmap failing to report 'hole' for unallocated regions"
        - "Partial block writes (512b) on larger block size filesystems not creating expected holes"
      investigation_steps:
        - "Check if the filesystem has 'extsize' or 'realtime' flags which change allocation behavior"
        - "Run xfs_bmap -vvv on the resulting file to see the extent map"
        - "Verify randholes tool output for errors"
      platform_factors:
        ppc64le:
          bug_probability: medium
          note: "64KB page size may affect hole creation granularity compared to 4KB"
          extra_steps:
            - "Check if holes are being aligned to 64KB boundaries"
    output_patterns:
      - pattern: "holes is NOT in range"
        meaning: "The number of holes created differs significantly from the requested amount"
        bug_probability: medium
        classification: kernel_bug
      - pattern: "randholes returned"
        meaning: "The randholes helper utility crashed or failed"
        bug_probability: low
        classification: test_bug
  xfs/009:
    description: "XFS allocator test verifying preallocation (resvsp, allocsp) and O_TRUNC behavior"
    subsystem: "prealloc"
    test_type: "rw ioctl auto prealloc quick"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "Kernel regression in XFS_IOC_RESVSP or XFS_IOC_ALLOCSP ioctls"
        - "Failure to release speculative or reserved preallocations during O_TRUNC"
        - "Inconsistency in inode size updates when using space reservation ioctls"
      investigation_steps:
        - "Check if the kernel supports XFS_IOC_RESVSP by running xfs_io -c 'resvsp 0 1m' on a temp file"
        - "Verify if block size (bsize) is being calculated correctly for the current mount"
        - "Compare dmesg output for 'XFS: Internal error' during allocator operations"
      platform_factors:
        ppc64le:
          bug_probability: medium
          note: "64KB page size may affect internal block alignment calculations for reservations"
          extra_steps:
            - "Verify block alignment with 'xfs_bmap -vvp'"
    output_patterns:
      - pattern: "Invalid argument"
        meaning: "Kernel or xfs_io doesn't support the requested preallocation ioctl"
        bug_probability: low
        classification: tool_version_mismatch
      - pattern: "filesize = [^0]"
        meaning: "O_TRUNC failed to clear the file size after reservation, or reservation incorrectly modified size"
        bug_probability: high
        classification: kernel_bug
      - pattern: "failed to mkfs"
        meaning: "mkfs.xfs failed, likely due to incompatible MKFS_OPTIONS"
        bug_probability: low
        classification: config_problem

  xfs/010:
    description: "Test xfs_repair detection and fixing of free inode btree (finobt) corruptions"
    subsystem: "finobt / repair"
    test_type: "auto quick repair"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "xfs_repair logic error in reconstructing finobt from inode chunks"
        - "Kernel finobt implementation failing to update AG headers correctly"
        - "Corruption injected by xfs_db was not reached or recognized by repair"
      investigation_steps:
        - "Verify that 'finobt=1' was actually enabled in mkfs output"
        - "Check 'xfs_repair -n' (no-modify) output to see if it correctly identifies the mismatch before repair"
        - "Examine xfs_db output in $seqres.full to ensure corruption was successfully written"
    output_patterns:
      - pattern: "finobt ir_freecount/free mismatch"
        meaning: "xfs_repair found finobt corruption; if this persists after repair, repair failed"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Allowing write of corrupted"
        meaning: "xfs_db successfully corrupted the disk, expected behavior for this test"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "Operation not supported"
        meaning: "The filesystem was built without finobt support or the kernel is too old"
        bug_probability: low
        classification: config_problem

  xfs/011:
    description: "Verify XFS log reservation mechanism for leaks after filesystem freeze"
    subsystem: "log"
    test_type: "auto freeze log metadata quick"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Transaction reservation leak in a specific metadata path (e.g. symlink, rename)"
        - "AIL (Active Item List) failing to return unused reservation space to grant heads"
        - "Incorrect accounting of log grant heads during high concurrency"
      investigation_steps:
        - "Check /sys/fs/xfs/<dev>/log/ values before and after the freeze manually"
        - "Identify which fsstress operation might be leaking by narrowing down -f flags"
        - "Check if kernel has specific log fixes for the current version (e.g., xlog_grant_push_ail)"
    output_patterns:
      - pattern: "possible leak detected"
        meaning: "Log grant head does not match log head after freeze, indicating leaked bytes"
        bug_probability: high
        classification: kernel_bug
      - pattern: "does not match"
        meaning: "Cycle or bytes mismatch between grant head and log head"
        bug_probability: high
        classification: kernel_bug
      - pattern: "No such file or directory"
        meaning: "XFS sysfs log stats missing, possibly due to kernel version or naming change"
        bug_probability: low
        classification: test_environment_issue

  xfs/012:
    description: "Test XFS sparse file hole creation and bmap reporting"
    subsystem: "holes"
    test_type: "rw auto quick"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "Allocator failing to create holes when writing at specific offsets"
        - "xfs_bmap failing to report hole extents correctly"
        - "File system block size vs page size mismatch affecting hole granularity"
      investigation_steps:
        - "Run 'xfs_bmap -vvp' on the output file to see the actual extent map"
        - "Check if the 'holes' helper tool was compiled correctly in the src directory"
        - "Verify if the filesystem was mounted with options that disable sparse files (rare for XFS)"
    output_patterns:
      - pattern: "unexpected number of holes"
        meaning: "The number of detected holes does not match the test parameters, indicating an allocator or bmap bug"
        bug_probability: high
        classification: kernel_bug
      - pattern: "holes returned [^0]"
        meaning: "The 'holes' test binary crashed or returned an error code"
        bug_probability: low
        classification: test_bug
      - pattern: "command not found"
        meaning: "xfs_bmap or the 'holes' tool is missing from the environment"
        bug_probability: low
        classification: tool_version_mismatch

  xfs/013:
    description: "Stress test the free inode btree (finobt) under high inode churn"
    subsystem: "finobt"
    test_type: "auto metadata stress"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Race condition in finobt tree updates during concurrent allocation/deletion"
        - "Corruption of the finobt root or nodes due to improper locking"
        - "ENOSPC handling bug when finobt needs to split but no blocks are available"
      investigation_steps:
        - "Check dmesg for 'XFS: Internal error' or 'Corruption detected' during the stress run"
        - "Run 'xfs_repair -n' immediately after a failure to identify the type of corruption"
        - "Check if fsstress died due to an OOM killer instead of a filesystem error"
    output_patterns:
      - pattern: "fsstress died"
        meaning: "Background stress process terminated unexpectedly, likely a kernel crash or OOM"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Structure needs cleaning"
        meaning: "Filesystem metadata corruption detected by the kernel"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Input/output error"
        meaning: "I/O failure which could indicate metadata corruption or disk issues"
        bug_probability: medium
        classification: kernel_bug

  xfs/014:
    description: "Test XFS speculative preallocation reclamation at ENOSPC and EDQUOT"
    subsystem: "prealloc / enospc / quota"
    test_type: "auto enospc quick quota prealloc"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "Speculative preallocation not being reclaimed when the filesystem hits ENOSPC"
        - "Quota subsystem failing to trigger preallocation GC when user hits EDQUOT"
        - "Mount option 'allocsize' overriding default speculative behavior"
      investigation_steps:
        - "Check if 'xfs_info' shows 'prealloc=0' or other non-default settings"
        - "Verify that background garbage collection threads (xfs_eofblocks_worker) are running"
        - "Check if the kernel supports 'speculative prealloc' by looking for 'spec_prealloc' in sysfs"
    output_patterns:
      - pattern: "No space left on device"
        meaning: "Unexpected ENOSPC before all speculative preallocations were reclaimed"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Warning: No speculative preallocation"
        meaning: "Test failed to trigger the target behavior, possibly due to mount options or kernel config"
        bug_probability: low
        classification: config_problem
      - pattern: "Disk quota exceeded"
        meaning: "Unexpected EDQUOT, indicating preallocation reclamation failed to satisfy quota"
        bug_probability: high
        classification: kernel_bug

  xfs/015:
    description: "Verify inode allocation capability in new space added by xfs_growfs"
    subsystem: "growfs / enospc"
    test_type: "auto enospc growfs"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Inode allocator not being notified of new AGs added during growfs"
        - "Corruption in the new AG headers preventing inode chunk allocation"
        - "Race between growfs and background inode allocators"
      investigation_steps:
        - "Check 'xfs_info' after growfs to verify the number of AGs increased"
        - "Run 'xfs_repair -n' to see if the grown portion of the disk is valid"
        - "Examine $seqres.full for the exact inode usage percentages reported by df"
    output_patterns:
      - pattern: "used inodes is NOT in range"
        meaning: "Failed to allocate enough inodes in the newly grown space"
        bug_probability: high
        classification: kernel_bug
      - pattern: "xfs_growfs: [Nn]o space left on device"
        meaning: "The grow operation itself failed, likely a kernel or device error"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Operation not supported"
        meaning: "Growing the filesystem is not supported on this device/config (e.g. zoned RT)"
        bug_probability: low
        classification: test_environment_issue

  xfs/016:
    description: "Regression test for log wrap-around overwrite bug (#796141)"
    subsystem: "log"
    test_type: "rw auto quick"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "Log manager (xlog) incorrectly calculating the end-of-log boundary"
        - "Stale block wiping logic overwriting valid data blocks outside the log"
        - "Off-by-one error in log wrap-around sector math"
      investigation_steps:
        - "Use 'xfs_logprint' to examine the state of the log after the failure"
        - "Verify the log size and location using 'xfs_db -c log' to ensure it hasn't moved"
        - "Check dmesg for any log I/O errors or checksum failures"
    output_patterns:
      - pattern: "corruption detected"
        meaning: "The pattern check (0xc6) found unexpected data where the log should not have written"
        bug_probability: high
        classification: kernel_bug
      - pattern: "failed: value"
        meaning: "devzero check failed, indicating data corruption in the test area"
        bug_probability: high
        classification: kernel_bug
      - pattern: "UQuota are enabled"
        meaning: "User quotas are enabled, which adds noise to log traffic and invalidates the test"
        bug_probability: low
        classification: test_environment_issue
  xfs/017:
    description: "Stress test remounting XFS as read-only and verifying log cleanliness and FS integrity"
    subsystem: "mount / remount / log"
    test_type: "mount auto quick stress"
    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "Filesystem failing to flush all pending transactions before completing remount-ro"
        - "Log remains in a dirty state after a successful remount to read-only"
        - "Metadata corruption occurring during fsstress not caught until xfs_repair -n"
      investigation_steps:
        - "Check dmesg for 'XFS: log IO error' or 'XFS: Filesystem has been shut down' during remount"
        - "Run 'xfs_logprint -t' on the scratch device to inspect the state of the log"
        - "Verify if the issue is reproducible without the remount-ro step using just fsstress and repair"
      platform_factors:
        ppc64le:
          bug_probability: low
          note: "64KB page size may impact the timing of buffer flushes during remount"
    output_patterns:
      - pattern: "remount ro failed"
        meaning: "The kernel refused to remount the filesystem as read-only, likely due to active writers or internal errors"
        bug_probability: high
        classification: kernel_bug
      - pattern: "DIRTY LOG"
        meaning: "xfs_logprint detected uncommitted transactions in the log of a supposedly read-only clean filesystem"
        bug_probability: high
        classification: kernel_bug
      - pattern: "xfs_repair -n failed"
        meaning: "xfs_repair found metadata inconsistencies on the filesystem after the stress test"
        bug_probability: high
        classification: kernel_bug

  xfs/018:
    description: "Verify Logged Attribute (LARP) replay functionality after simulated crashes"
    subsystem: "attributes / log / LARP"
    test_type: "auto quick attr"
    failure_analysis:
      bug_probability: high
      classification: kernel_bug
      common_causes:
        - "LARP (Logged Attributes) failing to properly recover attribute state after log replay"
        - "Error injection 'larp' or 'da_leaf_split' causing unexpected permanent metadata corruption"
        - "Inconsistency between the attribute hash in the log and the final state on disk"
      investigation_steps:
        - "Verify that /sys/fs/xfs/debug/larp is correctly set to 1 before the test starts"
        - "Use 'xfs_db -c \"attr_get\"' to manually inspect attributes on files that failed recovery"
        - "Check for 'XFS: Log-based extended attributes' in kernel logs to confirm LARP support"
      platform_factors:
        s390x:
          bug_probability: medium
          note: "Big-endian byte order could lead to issues in LARP log record parsing"
    output_patterns:
      - pattern: "Input/output error"
        meaning: "Filesystem shutdown occurred as expected due to error injection, but may indicate failure if occurring post-remount"
        bug_probability: medium
        classification: kernel_bug
      - pattern: "Operation not supported"
        meaning: "LARP or attribute feature is not supported by the current kernel or filesystem configuration"
        bug_probability: low
        classification: config_problem
      - pattern: "attr_name:.*differs"
        meaning: "Attribute value after recovery does not match the value before the crash"
        bug_probability: high
        classification: kernel_bug

  xfs/019:
    description: "Test mkfs.xfs protofile functionality for creating predefined directory structures"
    subsystem: "mkfs"
    test_type: "mkfs auto quick"
    failure_analysis:
      bug_probability: low
      classification: tool_version_mismatch
      common_causes:
        - "mkfs.xfs failing to correctly parse the protofile syntax or handle long filenames in protofiles"
        - "Incompatibility between the protofile format and modern XFS features (e.g. reflink, rmapbt)"
        - "Incorrect UID/GID or mode assignment during initial inode creation via mkfs"
      investigation_steps:
        - "Inspect the temporary protofile generated at $tmp.proto for formatting errors"
        - "Run mkfs.xfs manually with the protofile to see detailed error output"
        - "Check if the test fails only with specific mkfs options like '-m crc=0'"
    output_patterns:
      - pattern: "failed to create test protofile"
        meaning: "The test script failed to generate the protofile input, likely due to disk space or permissions in $tmp"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "Mode:.*differs"
        meaning: "The file mode on the created filesystem does not match the specification in the protofile"
        bug_probability: medium
        classification: kernel_bug
      - pattern: "unrecognized option"
        meaning: "mkfs.xfs version mismatch or invalid parameters provided in MKFS_OPTIONS"
        bug_probability: low
        classification: tool_version_mismatch

  xfs/020:
    description: "Regression test for xfs_repair segfault when scanning very large (60TB) filesystems"
    subsystem: "repair / metadata"
    test_type: "auto repair"
    failure_analysis:
      bug_probability: low
      classification: tool_version_mismatch
      common_causes:
        - "Regression in xfsprogs progress reporting logic causing a null pointer dereference"
        - "Out of memory (OOM) condition in xfs_repair when allocating structures for 60TB volume"
        - "Environment unable to handle large sparse files used for the dummy 60TB device"
      investigation_steps:
        - "Check dmesg for 'xfs_repair.*segfault at' or 'Out of memory: Kill process'"
        - "Verify xfsprogs version is >= 3.2.1 (contains fix for commit 7f2d6b8)"
        - "Check if the underlying filesystem for TEST_DIR supports large sparse files (hole punching/truncate)"
    output_patterns:
      - pattern: "Segmentation fault"
        meaning: "xfs_repair crashed during the repair process, confirming the regression"
        bug_probability: high
        classification: kernel_bug
      - pattern: "Cannot create 60T sparse file"
        meaning: "The environment does not support creating the large file required for the test"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "Killed"
        meaning: "xfs_repair was likely killed by the OOM killer due to high memory usage"
        bug_probability: medium
        classification: test_environment_issue

  xfs/021:
    description: "Verify xfs_db attribute type handling and display accuracy"
    subsystem: "db / attributes"
    test_type: "db attr auto quick"
    failure_analysis:
      bug_probability: low
      classification: test_bug
      common_causes:
        - "xfs_db output format changed in newer xfsprogs, breaking the test filters"
        - "Parent pointers feature (if enabled) changing the attribute layout in ways the test doesn't expect"
        - "xfs_db failing to correctly parse or identify attribute blocks"
      investigation_steps:
        - "Compare the output in $seqres.full with the expected .out file to identify formatting mismatches"
        - "Check if 'parent' pointers are enabled: 'xfs_info $SCRATCH_MNT | grep parent'"
        - "Run xfs_db manually on the scratch device to inspect the attribute blocks directly"
    output_patterns:
      - pattern: "unrecognized type"
        meaning: "xfs_db does not recognize the internal XFS metadata type, possibly due to newer disk format features"
        bug_probability: low
        classification: tool_version_mismatch
      - pattern: "unknown command"
        meaning: "The version of xfs_db installed does not support the commands used by the test"
        bug_probability: low
        classification: tool_version_mismatch
      - pattern: "Mode:.*differs"
        meaning: "Mismatch in expected attribute metadata, potentially a kernel or tool bug in attr handling"
