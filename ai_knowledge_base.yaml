      investigation_steps:
        - "Verify the geometry of the scratch device with 'xfs_db -c sb -c p'"
        - "Check if the device has 'bogus' secondary superblocks from previous tests (run 'devzero' as the test does)"
        - "Examine dmesg for 'I/O error' if the corruption tool failed to write to the block device"
    output_patterns:
      - pattern: "bad primary superblock - bad magic number"
        meaning: "Expected corruption, but if Phase 1 fails to find a secondary, it's a repair bug"
        bug_probability: high
        classification: kernel_bug
      - pattern: "sorry, could not find valid secondary superblock"
        meaning: "xfs_repair failed its primary mission of finding backup metadata"
        bug_probability: high
        classification: kernel_bug
      - pattern: "unrecognized option"
        meaning: "xfs_db or xfs_repair called with unsupported arguments (e.g. metadir options)"
        bug_probability: low
