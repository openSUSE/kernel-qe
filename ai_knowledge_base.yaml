      investigation_steps:
        - "Compare the output of 'xfs_repair -n' (no-modify) before and after a full repair"
        - "Check if the inode size ($isize) or block size affects the directory form (shortform vs block)"
        - "Verify if 'rtinherit' or other mkfs options are interfering with the proto-file"
    output_patterns:
      - pattern: "ERROR: repair round.*differs to round 0"
        meaning: "Repair is not idempotent; it found new 'errors' on a filesystem it just repaired"
        bug_probability: high
