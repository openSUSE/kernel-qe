          note: "Varying page sizes (4K/16K/64K) will change which block sizes are supported for mounting"
    output_patterns:
      - pattern: "xfs_copy.*failed for Sector size"
        meaning: "xfs_copy tool failure during the copy process"
        bug_probability: high
        classification: kernel_bug
      - pattern: "xfs_copy.*corrupted for Sector size"
