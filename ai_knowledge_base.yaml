        - "Tape media errors during dump causing silent data corruption"
        - "xfsdump failing to handle specific file patterns generated by src/fill"
        - "Incorrect tape device path provided in TAPE_DEV"
      investigation_steps:
        - "Use 'diff -r' to compare the original and restored directory contents"
