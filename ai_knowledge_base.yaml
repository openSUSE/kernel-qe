    output_patterns:
      - pattern: "cannot put tape into variable block size mode"
        meaning: "Tape driver or hardware does not support required variable block size mode"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "drive_minrmt_read_label: read 0 bytes"
        meaning: "Failed to read tape label, likely empty media or hardware fault"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "unrecognized option"
        meaning: "xfsdump version mismatch; installed version does not support -m (min strategy)"
        bug_probability: low
        classification: tool_version_mismatch

  xfs/026:
