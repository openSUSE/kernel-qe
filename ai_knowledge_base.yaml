    failure_analysis:
      bug_probability: low
      classification: test_environment_issue
      common_causes:
        - "Tape device not in variable block size mode (mt setblk 0)"
        - "Incompatibility between xfsdump and the specific tape hardware/emulation (e.g. st driver)"
        - "xfsdump inventory corruption in /var/xfsdump/inventory"
      investigation_steps:
        - "Verify tape state with 'mt -f $TAPE_DEV status'"
        - "Check if xfsdump version matches the expected output format"
        - "Inspect /var/xfsdump/inventory for stale entries from previous failed runs"
    output_patterns:
      - pattern: "drive_scsitape.*failed"
