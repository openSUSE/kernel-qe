    failure_analysis:
      bug_probability: medium
      classification: kernel_bug
      common_causes:
        - "xfsdump level 1 (incremental) dump failing to identify all modified files since level 0"
        - "Timestamp resolution issues causing the dump to skip files modified shortly before the dump"
        - "Inventory management failure preventing level 1 dump from finding the level 0 record"
      investigation_steps:
        - "Check if the system clock or filesystem timestamps are inconsistent"
        - "Inspect 'xfsdump -I' output to verify level 0 dump is correctly registered"
        - "Verify that 'bstat' shows updated mtime/ctime for the newly added files"
    output_patterns:
      - pattern: "no level 0 dump found"
        meaning: "Incremental dump failed because the inventory is missing the base level 0 dump"
        bug_probability: low
        classification: test_environment_issue
      - pattern: "diff:.*differs"
        meaning: "Incremental restore did not produce the expected final state of the filesystem"
        bug_probability: high
        classification: kernel_bug
      - pattern: "xfsdump:.*level 1 dump.*failed"
        meaning: "Incremental dump operation itself failed to complete"
        bug_probability: medium
        classification: kernel_bug
  xfs/025:
